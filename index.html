<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính và Quyết toán Thuế Thu Nhập Cá Nhân</title>
    
    <!-- Tích hợp Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tích hợp thư viện React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Tích hợp thư viện Babel để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animation đặc biệt cho nút bấm */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- HỆ THỐNG ICON (Chuyển đổi từ Lucide React) ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Calculator = (p) => <Icon {...p}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="18" y2="18"/></Icon>;
        const Plus = (p) => <Icon {...p}><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
        const Baby = (p) => <Icon {...p}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 1.5-2 1.5c-2 0-2.5 2-2.5 2"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const Wallet = (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></Icon>;
        const Receipt = (p) => <Icon {...p}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></Icon>;
        const ShieldCheck = (p) => <Icon {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/></Icon>;
        const FileCheck = (p) => <Icon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/></Icon>;
        const Mail = (p) => <Icon {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
        const Phone = (p) => <Icon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
        const Heart = (p) => <Icon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
        const Landmark = (p) => <Icon {...p}><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7 12 2"/></Icon>;
        const MessageSquare = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;

        // --- CÁC HÀM TIỆN ÍCH ---
        const formatCurrency = (value) => {
            if (value === null || value === undefined || value === '') return '';
            if (typeof value === 'number') return Math.round(value).toLocaleString('vi-VN');
            const numberString = value.toString().replace(/[^0-9]/g, '');
            if (!numberString) return '';
            return parseInt(numberString, 10).toLocaleString('vi-VN');
        };

        const parseCurrency = (value) => {
            if (!value) return 0;
            return parseInt(value.toString().replace(/[^0-9]/g, ''), 10) || 0;
        };

        // --- COMPONENT CHÍNH ---
        function App() {
            const [year, setYear] = useState(new Date().getFullYear());
            const [incomeInputType, setIncomeInputType] = useState('yearly');
            
            const [yearlyIncomes, setYearlyIncomes] = useState([{ id: Date.now() + 3, amount: '' }]);
            const [incomes, setIncomes] = useState([{ id: Date.now(), startMonth: 1, endMonth: 12, salary: '' }]);
            
            const [insurances, setInsurances] = useState([{ id: Date.now() + 1, startMonth: 1, endMonth: 12, base: '' }]);
            const [dependents, setDependents] = useState([]);
            const [deductedTaxes, setDeductedTaxes] = useState([{ id: Date.now() + 4, amount: '' }]);

            const [result, setResult] = useState(null);
            const [formError, setFormError] = useState('');

            const addItem = (setter, defaultItem) => setter(prev => [...prev, { ...defaultItem, id: Date.now() + Math.random() }]);
            const removeItem = (setter, id) => setter(prev => prev.filter(item => item.id !== id));
            const updateItem = (setter, id, field, value) => setter(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));

            const enforceLimits = (val) => {
                const numStr = val.toString().replace(/[^0-9]/g, '');
                if (!numStr) return '';
                let num = parseInt(numStr, 10);
                if (num > 10000000000) num = 10000000000;
                return num.toString();
            };

            const addYearlyIncome = () => addItem(setYearlyIncomes, { amount: '' });
            const removeYearlyIncome = (id) => removeItem(setYearlyIncomes, id);
            const updateYearlyIncome = (id, value) => updateItem(setYearlyIncomes, id, 'amount', enforceLimits(value));

            const addIncome = () => addItem(setIncomes, { startMonth: 1, endMonth: 12, salary: '' });
            const removeIncome = (id) => removeItem(setIncomes, id);
            const updateIncomeMonth = (id, field, value) => updateItem(setIncomes, id, field, parseInt(value, 10));
            const updateIncomeSalary = (id, value) => updateItem(setIncomes, id, 'salary', enforceLimits(value));

            const addInsurance = () => addItem(setInsurances, { startMonth: 1, endMonth: 12, base: '' });
            const removeInsurance = (id) => removeItem(setInsurances, id);
            const updateInsuranceMonth = (id, field, value) => updateItem(setInsurances, id, field, parseInt(value, 10));
            const updateInsuranceBase = (id, value) => updateItem(setInsurances, id, 'base', enforceLimits(value));

            const addDependent = () => addItem(setDependents, { startMonth: 1, endMonth: 12, type: 'child' });
            const removeDependent = (id) => removeItem(setDependents, id);
            const updateDependent = (id, field, value) => updateItem(setDependents, id, field, field === 'type' ? value : parseInt(value, 10));

            const addDeductedTax = () => addItem(setDeductedTaxes, { amount: '' });
            const removeDeductedTax = (id) => removeItem(setDeductedTaxes, id);
            const updateDeductedTax = (id, value) => updateItem(setDeductedTaxes, id, 'amount', enforceLimits(value));

            const handleCalculate = () => {
                setFormError('');
                let hasError = false;
                
                const currentYear = parseInt(year, 10);
                const personalDeductionRate = currentYear >= 2026 ? 15500000 : 11000000;
                const dependentDeductionRate = currentYear >= 2026 ? 6200000 : 4400000;

                const monthData = Array.from({ length: 12 }, () => ({ 
                    salary: 0, hasIncome: false, 
                    insuranceBase: 0, hasInsurance: false,
                    dependentCount: 0
                }));

                if (incomeInputType === 'yearly') {
                    const annual = yearlyIncomes.reduce((sum, inc) => sum + parseCurrency(inc.amount), 0);
                    for(let i = 1; i <= 12; i++) {
                        monthData[i - 1].salary = annual / 12;
                        monthData[i - 1].hasIncome = true;
                    }
                } else {
                    incomes.forEach(inc => {
                        if (inc.endMonth < inc.startMonth) hasError = true;
                        const sal = parseCurrency(inc.salary);
                        for(let i = inc.startMonth; i <= inc.endMonth; i++) {
                            monthData[i - 1].salary = sal;
                            monthData[i - 1].hasIncome = true;
                        }
                    });
                }

                insurances.forEach(ins => {
                    if (ins.endMonth < ins.startMonth) hasError = true;
                    const customBase = parseCurrency(ins.base);
                    for(let i = ins.startMonth; i <= ins.endMonth; i++) {
                        monthData[i - 1].hasInsurance = true;
                        monthData[i - 1].insuranceBase = customBase;
                    }
                });

                dependents.forEach(dep => {
                    if (dep.endMonth < dep.startMonth) hasError = true;
                    for(let i = dep.startMonth; i <= dep.endMonth; i++) {
                        monthData[i - 1].dependentCount += 1;
                    }
                });

                if (hasError) {
                    setFormError("Tháng kết thúc không được nhỏ hơn tháng bắt đầu trong các giai đoạn!");
                    return;
                }

                let totalIncome = 0;
                let totalInsurance = 0;
                let activeMonthsCount = 0;
                let dependentDeduction = 0;

                monthData.forEach(m => {
                    if (m.hasIncome && m.salary > 0) {
                        activeMonthsCount++;
                        totalIncome += m.salary;
                    }
                    if (m.hasInsurance && m.insuranceBase > 0) {
                        totalInsurance += m.insuranceBase * 0.105;
                    }
                    dependentDeduction += m.dependentCount * dependentDeductionRate;
                });

                totalIncome = Math.round(totalIncome);
                totalInsurance = Math.round(totalInsurance);

                if (totalIncome <= 0) {
                    setFormError(incomeInputType === 'yearly' ? "Vui lòng nhập tổng thu nhập 1 năm hợp lệ." : "Vui lòng nhập mức lương hợp lệ.");
                    return;
                }

                const workingMonths = Math.max(1, activeMonthsCount);
                const personalDeduction = personalDeductionRate * workingMonths;
                const totalDeductions = totalInsurance + personalDeduction + dependentDeduction;

                let taxableIncome = totalIncome - totalDeductions;
                if (taxableIncome < 0) taxableIncome = 0;

                const avgMonthlyTaxableIncome = taxableIncome / workingMonths;
                let avgMonthlyTax = 0;

                if (avgMonthlyTaxableIncome > 0) {
                    if (avgMonthlyTaxableIncome <= 5000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.05;
                    else if (avgMonthlyTaxableIncome <= 10000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.10 - 250000;
                    else if (avgMonthlyTaxableIncome <= 18000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.15 - 750000;
                    else if (avgMonthlyTaxableIncome <= 32000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.20 - 1650000;
                    else if (avgMonthlyTaxableIncome <= 52000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.25 - 3250000;
                    else if (avgMonthlyTaxableIncome <= 80000000) avgMonthlyTax = avgMonthlyTaxableIncome * 0.30 - 5850000;
                    else avgMonthlyTax = avgMonthlyTaxableIncome * 0.35 - 9850000;
                }

                const totalTax = Math.round(avgMonthlyTax * workingMonths);
                const totalDeductedTax = deductedTaxes.reduce((sum, tax) => sum + parseCurrency(tax.amount), 0);
                const finalTaxDifference = totalTax - totalDeductedTax;

                setResult({
                    currentYear,
                    personalDeductionRate,
                    dependentDeductionRate,
                    workingMonths, totalIncome, totalInsurance,
                    personalDeduction, dependentDeduction,
                    totalDeductions, taxableIncome, totalTax,
                    totalDeductedTax, finalTaxDifference
                });
            };

            return (
                <div className="min-h-screen bg-slate-50 py-10 px-4 font-sans text-slate-800">
                    <div className="max-w-6xl mx-auto space-y-8">
                        
                        {/* Header Tô Màu */}
                        <div className="bg-gradient-to-br from-blue-900 to-slate-900 p-6 sm:p-8 rounded-3xl shadow-xl border border-blue-800/50 flex flex-col xl:flex-row items-center justify-between gap-6 relative overflow-hidden text-white">
                            
                            {/* Decorative background elements */}
                            <div className="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                            <div className="absolute bottom-0 left-0 w-48 h-48 bg-blue-400/10 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
                            
                            <div className="flex flex-col sm:flex-row items-start sm:items-center space-y-4 sm:space-y-0 sm:space-x-5 relative z-10 w-full xl:w-1/2">
                                <div className="p-3 sm:p-4 bg-white/10 backdrop-blur-md text-white rounded-2xl shadow-lg border border-white/10 hidden sm:block shrink-0">
                                    <Landmark size={36} />
                                </div>
                                <div className="w-full">
                                    <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight mb-4 drop-shadow-sm leading-tight">
                                        Tính và Quyết toán Thuế Thu Nhập Cá Nhân
                                    </h1>
                                    <div className="flex flex-col gap-3 text-sm sm:text-base font-medium text-indigo-50">
                                        <div className="flex items-center gap-2">
                                            <Info size={18} className="text-blue-300 shrink-0" />
                                            <span className="leading-relaxed">Kết quả thuế TNCN chính xác dựa trên công thức công bố từ cơ quan Nhà Nước.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Contact, Coffee & QR Section */}
                            <div className="flex flex-col sm:flex-row items-center gap-5 bg-white/10 p-4 sm:p-5 rounded-2xl backdrop-blur-sm border border-white/10 w-full xl:w-auto relative z-10 shrink-0 shadow-inner">
                                
                                {/* QR Code moves to the left */}
                                <div className="flex flex-col items-center gap-2 shrink-0 border-b sm:border-b-0 sm:border-r border-white/20 pb-4 sm:pb-0 sm:pr-5 mb-2 sm:mb-0">
                                    <div className="bg-white p-1.5 rounded-xl shadow-md">
                                        <img src="qr.jpg" alt="QR Code" className="w-20 h-20 sm:w-24 sm:h-24 rounded-lg object-contain" />
                                    </div>
                                    <div className="text-center mt-1">
                                        <div className="text-xs font-bold text-white tracking-wide">Vietcombank</div>
                                        <div className="text-xs font-semibold text-blue-200 font-mono tracking-wider mt-0.5">0071001071803</div>
                                    </div>
                                </div>

                                {/* Text content moves to the right */}
                                <div className="flex flex-col items-center sm:items-start text-center sm:text-left w-full sm:w-auto overflow-hidden space-y-2">
                                    <div className="flex items-center gap-2 bg-emerald-500/20 text-emerald-50 px-3 py-1.5 rounded-lg w-fit border border-emerald-400/30 mb-1">
                                        <MessageSquare size={16} className="text-emerald-300 shrink-0" />
                                        <span className="font-semibold text-sm">Nhận góp ý, tư vấn, quyết toán thuế</span>
                                    </div>
                                    
                                    <a href="mailto:ngchicongvt@gmail.com" className="flex items-center justify-center sm:justify-start gap-2 text-sm text-indigo-50 hover:text-white transition-colors w-full sm:w-auto">
                                        <Mail size={16} className="opacity-80 shrink-0" />
                                        <span>ngchicongvt@gmail.com</span>
                                    </a>
                                    <a href="tel:0902288060" className="flex items-center justify-center sm:justify-start gap-2 text-sm text-indigo-50 hover:text-white transition-colors w-full sm:w-auto">
                                        <Phone size={16} className="opacity-80 shrink-0" />
                                        <span>Điện thoại / Zalo: 0902288060</span>
                                    </a>

                                    <div className="flex items-center justify-center sm:justify-start gap-1.5 text-white whitespace-nowrap mt-2 pt-2 border-t border-white/10 w-full">
                                        <span className="text-sm font-medium text-indigo-100">Nếu bạn thấy có ích,</span>
                                        <span className="text-sm font-bold">mời mình ly cafe nha</span>
                                        <Heart size={16} className="text-pink-400 fill-pink-400 drop-shadow-sm shrink-0" />
                                    </div>
                                </div>
                                
                            </div>

                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Form Input Section */}
                            <div className="lg:col-span-7 space-y-6">
                                
                                {/* 1. Thông tin thu nhập */}
                                <div className="bg-white p-7 rounded-3xl shadow-sm hover:shadow-md transition-shadow border border-slate-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="flex items-center space-x-3">
                                            <div className="p-2 bg-blue-50 text-blue-600 rounded-lg"><Wallet size={20} /></div>
                                            <h2 className="text-xl font-bold text-slate-800">1. Thông tin thu nhập</h2>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-5">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-600 mb-1.5">Năm tính thuế</label>
                                            <select 
                                                value={year} 
                                                onChange={(e) => setYear(e.target.value)}
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium"
                                            >
                                                {[2024, 2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                        <div className="flex flex-wrap gap-2 p-1 bg-slate-50 rounded-xl border border-slate-200 inline-flex">
                                            <button
                                                onClick={() => setIncomeInputType('yearly')}
                                                className={`px-4 py-2 text-sm font-semibold rounded-lg transition-all ${incomeInputType === 'yearly' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                Tổng thu nhập 1 năm
                                            </button>
                                            <button
                                                onClick={() => setIncomeInputType('periods')}
                                                className={`px-4 py-2 text-sm font-semibold rounded-lg transition-all ${incomeInputType === 'periods' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                Chọn từng giai đoạn
                                            </button>
                                        </div>

                                        {incomeInputType === 'yearly' ? (
                                            <button 
                                                onClick={addYearlyIncome}
                                                className="flex items-center justify-center space-x-1 text-sm bg-indigo-50 text-indigo-600 font-medium px-4 py-2.5 rounded-xl hover:bg-indigo-100 transition-colors"
                                            >
                                                <Plus size={16} />
                                                <span>Thêm công ty</span>
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={addIncome}
                                                className="flex items-center justify-center space-x-1 text-sm bg-indigo-50 text-indigo-600 font-medium px-4 py-2.5 rounded-xl hover:bg-indigo-100 transition-colors"
                                            >
                                                <Plus size={16} />
                                                <span>Thêm giai đoạn</span>
                                            </button>
                                        )}
                                    </div>

                                    {incomeInputType === 'yearly' ? (
                                        <div className="space-y-4">
                                            {yearlyIncomes.map((yInc, index) => (
                                                <div key={yInc.id} className="bg-gradient-to-br from-indigo-50/50 to-white p-5 rounded-2xl border border-indigo-100 relative group hover:border-indigo-300">
                                                    {yearlyIncomes.length > 1 && (
                                                        <button 
                                                            onClick={() => removeYearlyIncome(yInc.id)}
                                                            className="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"
                                                            title="Xóa công ty"
                                                        >
                                                            <Trash2 size={18} />
                                                        </button>
                                                    )}
